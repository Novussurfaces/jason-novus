<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <defs>
    <linearGradient id="logo-gradient" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="text-shine" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fafafa"/>
      <stop offset="60%" stop-color="#fafafa"/>
      <stop offset="80%" stop-color="#a1a1aa"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
  </defs>
  <!-- Icon mark -->
  <rect x="0" y="4" width="40" height="40" rx="10" fill="url(#logo-gradient)"/>
  <!-- N letterform - premium geometric -->
  <path d="M11 32V16h3.2l10.6 12.4V16H28v16h-3.2L14.2 19.6V32H11z" fill="white"/>
  <!-- Accent diamond -->
  <rect x="30" y="8" width="5" height="5" rx="1" transform="rotate(45 32.5 10.5)" fill="white" opacity="0.3"/>
  <!-- NOVUS text -->
  <text x="52" y="27" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="url(#text-shine)">NOVUS</text>
  <!-- SURFACES text -->
  <text x="138" y="27" font-family="'Space Grotesk', 'Inter', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#2563eb">SURFACES</text>
  <!-- Subtle underline accent -->
  <rect x="52" y="34" width="30" height="1.5" rx="0.75" fill="#2563eb" opacity="0.4"/>
</svg>
