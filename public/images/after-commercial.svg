<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <!-- Clean commercial wall -->
    <linearGradient id="com-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f0ec"/>
      <stop offset="100%" stop-color="#e8e6e2"/>
    </linearGradient>
    <!-- Metallic epoxy base - rich charcoal with warm undertones -->
    <linearGradient id="metallic-base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="25%" stop-color="#444444"/>
      <stop offset="50%" stop-color="#3d3d3d"/>
      <stop offset="75%" stop-color="#4a4a48"/>
      <stop offset="100%" stop-color="#383838"/>
    </linearGradient>
    <!-- Metallic swirl pattern layer 1 -->
    <radialGradient id="swirl-1" cx="0.3" cy="0.4" r="0.6" fx="0.25" fy="0.35">
      <stop offset="0%" stop-color="#5a5a58" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="#4a4a48" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#555553" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3d3d3d" stop-opacity="0"/>
    </radialGradient>
    <!-- Metallic swirl pattern layer 2 -->
    <radialGradient id="swirl-2" cx="0.7" cy="0.6" r="0.5" fx="0.65" fy="0.55">
      <stop offset="0%" stop-color="#626260" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#505050" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3d3d3d" stop-opacity="0"/>
    </radialGradient>
    <!-- Metallic swirl layer 3 -->
    <radialGradient id="swirl-3" cx="0.5" cy="0.3" r="0.4">
      <stop offset="0%" stop-color="#585855" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#4d4d4b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3d3d3d" stop-opacity="0"/>
    </radialGradient>
    <!-- High-gloss reflective sheen -->
    <linearGradient id="hi-gloss" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="20%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Gold accent highlight -->
    <radialGradient id="gold-accent-1" cx="0.4" cy="0.4" r="0.35">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gold-accent-2" cx="0.65" cy="0.6" r="0.3">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <!-- Mirror-like ceiling reflection -->
    <linearGradient id="ceiling-reflect" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="15%" stop-color="white" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Metallic pearl shimmer filter -->
    <filter id="pearl-shimmer" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="22"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.08"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="screen"/>
    </filter>
    <!-- Wall light -->
    <radialGradient id="com-wall-light" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Junction shadow -->
    <linearGradient id="com-junction" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Pristine commercial wall -->
  <rect width="800" height="255" fill="url(#com-wall)"/>
  <rect width="800" height="255" fill="url(#com-wall-light)"/>

  <!-- Recessed LED lighting -->
  <rect x="80" y="30" width="640" height="5" rx="2.5" fill="#f8f4e8" opacity="0.5"/>
  <ellipse cx="400" cy="32" rx="350" ry="120" fill="white" opacity="0.04"/>

  <!-- Modern baseboard -->
  <rect x="0" y="242" width="800" height="14" fill="#d5d3cf" opacity="0.5"/>
  <line x1="0" y1="242" x2="800" y2="242" stroke="#c5c3bf" stroke-width="0.8" opacity="0.4"/>

  <!-- Wall-floor junction shadow -->
  <rect x="0" y="254" width="800" height="18" fill="url(#com-junction)"/>

  <!-- Metallic epoxy floor base -->
  <polygon points="0,254 800,254 800,600 0,600" fill="url(#metallic-base)"/>

  <!-- Metallic swirl patterns - creates that liquid metal look -->
  <polygon points="0,254 800,254 800,600 0,600" fill="url(#swirl-1)"/>
  <polygon points="0,254 800,254 800,600 0,600" fill="url(#swirl-2)"/>
  <polygon points="0,254 800,254 800,600 0,600" fill="url(#swirl-3)"/>

  <!-- Organic metallic swirl shapes -->
  <path d="M50,300 Q150,280 250,320 Q350,360 300,420 Q250,480 350,500 Q450,520 400,580"
        stroke="#5a5a56" stroke-width="40" fill="none" opacity="0.08" stroke-linecap="round"/>
  <path d="M500,270 Q600,290 650,340 Q700,390 620,430 Q540,470 580,530 Q620,580 700,600"
        stroke="#4e4e4c" stroke-width="50" fill="none" opacity="0.07" stroke-linecap="round"/>
  <path d="M200,260 Q180,320 250,370 Q320,420 280,480 Q240,540 320,590"
        stroke="#555552" stroke-width="35" fill="none" opacity="0.06" stroke-linecap="round"/>

  <!-- Pearl shimmer effect -->
  <polygon points="0,254 800,254 800,600 0,600" filter="url(#pearl-shimmer)" fill="#888" opacity="0.15"/>

  <!-- High-gloss sheen -->
  <polygon points="0,254 800,254 800,600 0,600" fill="url(#hi-gloss)"/>

  <!-- Ceiling reflection on floor (mirror effect) -->
  <polygon points="0,254 800,254 800,600 0,600" fill="url(#ceiling-reflect)"/>

  <!-- LED light reflection strips on floor -->
  <rect x="100" y="275" width="600" height="3" rx="1.5" fill="white" opacity="0.04"/>
  <ellipse cx="400" cy="276" rx="320" ry="30" fill="white" opacity="0.025"/>

  <!-- Gold accent reflections -->
  <ellipse cx="350" cy="380" rx="200" ry="120" fill="url(#gold-accent-1)"/>
  <ellipse cx="550" cy="480" rx="150" ry="100" fill="url(#gold-accent-2)"/>

  <!-- Sharp light reflections (window/light sources) -->
  <line x1="150" y1="270" x2="165" y2="590" stroke="white" stroke-width="1.5" opacity="0.035"/>
  <line x1="350" y1="260" x2="360" y2="595" stroke="white" stroke-width="2" opacity="0.045"/>
  <line x1="550" y1="265" x2="540" y2="590" stroke="white" stroke-width="1.5" opacity="0.04"/>
  <line x1="700" y1="270" x2="685" y2="595" stroke="white" stroke-width="1" opacity="0.03"/>

  <!-- Specular highlights - point reflections -->
  <circle cx="360" cy="340" r="30" fill="white" opacity="0.02"/>
  <circle cx="500" cy="400" r="25" fill="white" opacity="0.018"/>
  <circle cx="250" cy="480" r="20" fill="white" opacity="0.015"/>

  <!-- Subtle depth gradient at far edge -->
  <rect x="0" y="254" width="800" height="30" fill="white" opacity="0.025"/>
</svg>