<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="aw" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a1a2e"/><stop offset="100%" stop-color="#16213e"/></linearGradient>
    <linearGradient id="af" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3a5c"/>
      <stop offset="20%" stop-color="#3d5a80"/>
      <stop offset="40%" stop-color="#1e3050"/>
      <stop offset="60%" stop-color="#4a6a90"/>
      <stop offset="80%" stop-color="#2a4060"/>
      <stop offset="100%" stop-color="#3a5575"/>
    </linearGradient>
    <linearGradient id="ag" x1="0" y1="0" x2="0.5" y2="1"><stop offset="0%" stop-color="white" stop-opacity="0.1"/><stop offset="50%" stop-color="white" stop-opacity="0"/><stop offset="100%" stop-color="white" stop-opacity="0.05"/></linearGradient>
    <filter id="met">
      <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="5"/>
      <feColorMatrix type="saturate" values="0.3"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.06"/></feComponentTransfer>
      <feBlend in="SourceGraphic" mode="soft-light"/>
    </filter>
  </defs>
  <rect width="800" height="220" fill="url(#aw)"/>
  <polygon points="0,220 800,220 800,600 0,600" fill="url(#af)" filter="url(#met)"/>
  <polygon points="0,220 800,220 800,600 0,600" fill="url(#ag)"/>
  <!-- Metallic swirl effects -->
  <path d="M100,300 Q250,280 350,320 Q450,360 550,340 Q650,320 750,350" stroke="#5a7a9a" stroke-width="1.5" fill="none" opacity="0.08"/>
  <path d="M50,400 Q200,380 300,420 Q400,460 500,440 Q600,420 700,450" stroke="#4a6a8a" stroke-width="1.5" fill="none" opacity="0.06"/>
  <path d="M150,500 Q300,480 400,520 Q500,560 650,540" stroke="#6a8aaa" stroke-width="1" fill="none" opacity="0.05"/>
  <!-- Light reflections -->
  <ellipse cx="400" cy="380" rx="250" ry="100" fill="white" opacity="0.03"/>
  <ellipse cx="250" cy="460" rx="150" ry="60" fill="white" opacity="0.02"/>
  <!-- Ceiling lights (reflecting on glossy floor) -->
  <rect x="200" y="50" width="400" height="6" rx="3" fill="#4466aa" opacity="0.3"/>
  <rect x="200" y="120" width="400" height="6" rx="3" fill="#4466aa" opacity="0.3"/>
  <!-- Floor light reflections -->
  <ellipse cx="400" cy="320" rx="180" ry="15" fill="#5577bb" opacity="0.04"/>
  <ellipse cx="400" cy="380" rx="180" ry="15" fill="#5577bb" opacity="0.03"/>
  <rect x="20" y="20" width="110" height="34" rx="17" fill="#22c55e" opacity="0.95"/>
  <text x="75" y="42" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="white" text-anchor="middle" letter-spacing="1.5">APRÈS</text>
</svg>