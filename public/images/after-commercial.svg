<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="ac-bg" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <radialGradient id="ac-sheen" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#ac-bg)"/>
  <rect width="800" height="600" fill="url(#ac-sheen)"/>
  <!-- Quartz texture -->
  <filter id="quartz-tex">
    <feTurbulence type="fractalNoise" baseFrequency="2" numOctaves="3" seed="12"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.05" intercept="0.08"/>
      <feFuncG type="linear" slope="0.06" intercept="0.1"/>
      <feFuncB type="linear" slope="0.07" intercept="0.12"/>
    </feComponentTransfer>
  </filter>
  <rect width="800" height="600" filter="url(#quartz-tex)" opacity="0.5"/>
  <!-- Clean expansion joints -->
  <line x1="200" y1="0" x2="200" y2="600" stroke="#0891b2" stroke-width="2" stroke-opacity="0.08"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="#0891b2" stroke-width="2" stroke-opacity="0.08"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="#0891b2" stroke-width="2" stroke-opacity="0.08"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#0891b2" stroke-width="2" stroke-opacity="0.08"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#0891b2" stroke-width="2" stroke-opacity="0.08"/>
  <!-- Safety lane markings -->
  <rect x="170" y="230" width="460" height="4" rx="2" fill="#eab308" opacity="0.2"/>
  <rect x="170" y="365" width="460" height="4" rx="2" fill="#eab308" opacity="0.2"/>
  <!-- Glossy reflections -->
  <ellipse cx="400" cy="300" rx="250" ry="180" fill="white" opacity="0.015"/>
  <!-- Label -->
  <rect x="24" y="24" width="100" height="32" rx="8" fill="#22c55e" opacity="0.9"/>
  <text x="74" y="44" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="white">APRÈS</text>
</svg>
