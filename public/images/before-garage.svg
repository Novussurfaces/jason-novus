<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="bg-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg-floor)"/>
  <!-- Concrete texture simulation -->
  <filter id="concrete">
    <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="6" seed="2"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.15" intercept="0.15"/>
      <feFuncG type="linear" slope="0.14" intercept="0.14"/>
      <feFuncB type="linear" slope="0.13" intercept="0.13"/>
    </feComponentTransfer>
  </filter>
  <rect width="800" height="600" filter="url(#concrete)" opacity="0.8"/>
  <!-- Cracks -->
  <path d="M200 0 L210 120 L195 250 L220 380 L200 500 L215 600" stroke="#0a0a0a" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M210 120 L280 150 L350 140" stroke="#0a0a0a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M500 100 L490 220 L510 350 L495 480 L500 600" stroke="#0a0a0a" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M0 300 L150 310 L300 295 L450 305 L600 290 L800 310" stroke="#0a0a0a" stroke-width="2" fill="none" opacity="0.4"/>
  <!-- Oil stains -->
  <ellipse cx="350" cy="250" rx="80" ry="50" fill="#0d0d0d" opacity="0.5"/>
  <ellipse cx="600" cy="400" rx="60" ry="40" fill="#0f0e0d" opacity="0.4"/>
  <ellipse cx="150" cy="450" rx="50" ry="35" fill="#0d0d0e" opacity="0.35"/>
  <!-- Damage patches -->
  <rect x="400" y="350" width="120" height="80" rx="4" fill="#181818" opacity="0.3"/>
  <circle cx="250" cy="180" r="30" fill="#161616" opacity="0.3"/>
  <!-- Label -->
  <rect x="24" y="24" width="100" height="32" rx="8" fill="#dc2626" opacity="0.9"/>
  <text x="74" y="44" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="white">AVANT</text>
</svg>
