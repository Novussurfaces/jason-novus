<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="p2-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c14"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <!-- Floor gradient - solid dark gray epoxy -->
    <linearGradient id="p2-floor" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2a2a32"/>
      <stop offset="40%" stop-color="#222228"/>
      <stop offset="100%" stop-color="#1a1a1f"/>
    </linearGradient>
    <!-- Floor reflective highlight -->
    <linearGradient id="p2-shine" x1="0.3" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="30%" stop-color="#5a5a6a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <!-- Back wall -->
    <linearGradient id="p2-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#18182a"/>
      <stop offset="100%" stop-color="#121220"/>
    </linearGradient>
    <!-- Ceiling -->
    <linearGradient id="p2-ceil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0e0e1a"/>
    </linearGradient>
    <!-- Industrial light -->
    <radialGradient id="p2-light1" cx="30%" cy="10%" r="35%">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="p2-light2" cx="70%" cy="10%" r="35%">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Floor light pools -->
    <radialGradient id="p2-pool1" cx="30%" cy="60%" r="25%">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="p2-pool2" cx="70%" cy="60%" r="25%">
      <stop offset="0%" stop-color="#f5e6c8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Noise filter -->
    <filter id="p2-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply"/>
    </filter>
    <!-- Vignette -->
    <radialGradient id="p2-vignette" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.7"/>
    </radialGradient>
    <!-- Badge gradient -->
    <linearGradient id="p2-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Bottom bar -->
    <linearGradient id="p2-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <!-- Floor clip -->
    <clipPath id="p2-floorClip">
      <polygon points="100,165 500,165 600,330 0,330"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="600" height="400" fill="url(#p2-bg)"/>

  <!-- Ceiling -->
  <polygon points="0,10 600,10 500,50 100,50" fill="url(#p2-ceil)"/>
  <!-- Ceiling beams/trusses -->
  <line x1="50" y1="10" x2="150" y2="50" stroke="#1a1a25" stroke-width="2"/>
  <line x1="200" y1="10" x2="250" y2="50" stroke="#1a1a25" stroke-width="2"/>
  <line x1="400" y1="10" x2="350" y2="50" stroke="#1a1a25" stroke-width="2"/>
  <line x1="550" y1="10" x2="450" y2="50" stroke="#1a1a25" stroke-width="2"/>
  <!-- Ceiling cross beams -->
  <line x1="100" y1="50" x2="500" y2="50" stroke="#1a1a25" stroke-width="1.5"/>

  <!-- Industrial hanging lights -->
  <g opacity="0.7">
    <!-- Light 1 -->
    <line x1="200" y1="50" x2="200" y2="68" stroke="#2a2a35" stroke-width="1"/>
    <rect x="190" y="68" width="20" height="6" rx="2" fill="#2a2a35"/>
    <rect x="193" y="72" width="14" height="2" rx="1" fill="#f5e6c8" opacity="0.5"/>
    <!-- Light 2 -->
    <line x1="400" y1="50" x2="400" y2="68" stroke="#2a2a35" stroke-width="1"/>
    <rect x="390" y="68" width="20" height="6" rx="2" fill="#2a2a35"/>
    <rect x="393" y="72" width="14" height="2" rx="1" fill="#f5e6c8" opacity="0.4"/>
  </g>

  <!-- Back wall -->
  <polygon points="100,50 500,50 500,165 100,165" fill="url(#p2-wall)"/>
  <!-- Back wall loading dock doors -->
  <rect x="140" y="70" width="80" height="90" rx="2" fill="#0f0f1a" stroke="#252535" stroke-width="0.8"/>
  <rect x="145" y="75" width="70" height="42" rx="1" fill="#12121f"/>
  <rect x="145" y="120" width="70" height="37" rx="1" fill="#12121f"/>
  <rect x="260" y="70" width="80" height="90" rx="2" fill="#0f0f1a" stroke="#252535" stroke-width="0.8"/>
  <rect x="265" y="75" width="70" height="42" rx="1" fill="#12121f"/>
  <rect x="265" y="120" width="70" height="37" rx="1" fill="#12121f"/>
  <rect x="380" y="70" width="80" height="90" rx="2" fill="#0f0f1a" stroke="#252535" stroke-width="0.8"/>
  <rect x="385" y="75" width="70" height="42" rx="1" fill="#12121f"/>
  <rect x="385" y="120" width="70" height="37" rx="1" fill="#12121f"/>

  <!-- Left wall -->
  <polygon points="0,10 100,50 100,165 0,330" fill="#0e0e18"/>
  <!-- Right wall -->
  <polygon points="600,10 500,50 500,165 600,330" fill="#0e0e18"/>

  <!-- Pillars -->
  <!-- Left pillar -->
  <g>
    <polygon points="170,90 185,90 200,330 155,330" fill="#1a1a28"/>
    <polygon points="170,90 178,90 185,330 155,330" fill="#1f1f2d"/>
    <line x1="170" y1="90" x2="155" y2="330" stroke="#252538" stroke-width="0.5"/>
  </g>
  <!-- Center pillar -->
  <g>
    <polygon points="290,85 310,85 320,330 280,330" fill="#1a1a28"/>
    <polygon points="290,85 300,85 305,330 280,330" fill="#1f1f2d"/>
    <line x1="290" y1="85" x2="280" y2="330" stroke="#252538" stroke-width="0.5"/>
  </g>
  <!-- Right pillar -->
  <g>
    <polygon points="410,90 425,90 440,330 395,330" fill="#1a1a28"/>
    <polygon points="410,90 418,90 425,330 395,330" fill="#1f1f2d"/>
    <line x1="410" y1="90" x2="395" y2="330" stroke="#252538" stroke-width="0.5"/>
  </g>

  <!-- Floor -->
  <polygon points="100,165 500,165 600,330 0,330" fill="url(#p2-floor)"/>

  <!-- Floor grid lines for industrial look -->
  <g clip-path="url(#p2-floorClip)" opacity="0.15">
    <!-- Horizontal lines (perspective) -->
    <line x1="20" y1="195" x2="580" y2="195" stroke="#3a3a4a" stroke-width="0.5"/>
    <line x1="10" y1="225" x2="590" y2="225" stroke="#3a3a4a" stroke-width="0.5"/>
    <line x1="5" y1="260" x2="595" y2="260" stroke="#3a3a4a" stroke-width="0.5"/>
    <line x1="0" y1="295" x2="600" y2="295" stroke="#3a3a4a" stroke-width="0.5"/>
    <!-- Vertical lines (converging to vanishing point) -->
    <line x1="300" y1="165" x2="100" y2="330" stroke="#3a3a4a" stroke-width="0.3"/>
    <line x1="300" y1="165" x2="200" y2="330" stroke="#3a3a4a" stroke-width="0.3"/>
    <line x1="300" y1="165" x2="300" y2="330" stroke="#3a3a4a" stroke-width="0.3"/>
    <line x1="300" y1="165" x2="400" y2="330" stroke="#3a3a4a" stroke-width="0.3"/>
    <line x1="300" y1="165" x2="500" y2="330" stroke="#3a3a4a" stroke-width="0.3"/>
  </g>

  <!-- Floor shine -->
  <polygon points="100,165 500,165 600,330 0,330" fill="url(#p2-shine)"/>

  <!-- Light pools on floor -->
  <rect width="600" height="400" fill="url(#p2-pool1)"/>
  <rect width="600" height="400" fill="url(#p2-pool2)"/>

  <!-- Overhead light glows -->
  <rect width="600" height="400" fill="url(#p2-light1)"/>
  <rect width="600" height="400" fill="url(#p2-light2)"/>

  <!-- Wall-floor edge -->
  <line x1="100" y1="165" x2="500" y2="165" stroke="#2a2a3a" stroke-width="0.8" opacity="0.5"/>

  <!-- Vignette -->
  <rect width="600" height="400" fill="url(#p2-vignette)"/>

  <!-- Noise overlay -->
  <rect width="600" height="400" fill="#09090b" opacity="0.03" filter="url(#p2-noise)"/>

  <!-- COMPLÉTÉ badge -->
  <g transform="translate(24, 16)">
    <rect width="110" height="28" rx="6" fill="url(#p2-badge)" opacity="0.9"/>
    <rect width="110" height="28" rx="6" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="16" cy="14" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <polyline points="13.5,14 15.5,16 19,11.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <text x="58" y="18.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.5">COMPLÉTÉ</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="340" width="600" height="60" fill="url(#p2-bar)"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#7c3aed" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="24" y="352" width="3" height="28" rx="1.5" fill="#7c3aed" opacity="0.8"/>
  <text x="38" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fafafa" letter-spacing="0.5">Entrepôt — Montréal</text>
  <text x="38" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#7c3aed" opacity="0.8" letter-spacing="2">SCI-POLYUREA</text>
  <text x="576" y="376" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#a1a1aa" opacity="0.4" letter-spacing="1.5">NOVUS SURFACES</text>
</svg>