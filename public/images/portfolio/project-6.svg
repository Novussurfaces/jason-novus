<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <!-- Background -->
    <linearGradient id="p6-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <!-- Floor - heavy duty dark mortar -->
    <linearGradient id="p6-floor" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#252530"/>
      <stop offset="40%" stop-color="#1e1e28"/>
      <stop offset="100%" stop-color="#181820"/>
    </linearGradient>
    <!-- Floor subtle sheen -->
    <linearGradient id="p6-sheen" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.04"/>
      <stop offset="40%" stop-color="#5a5a6a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <!-- Wall -->
    <linearGradient id="p6-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161625"/>
      <stop offset="100%" stop-color="#10101c"/>
    </linearGradient>
    <!-- Ceiling -->
    <linearGradient id="p6-ceil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08080e"/>
      <stop offset="100%" stop-color="#0c0c16"/>
    </linearGradient>
    <!-- Industrial sodium lights -->
    <radialGradient id="p6-light1" cx="25%" cy="12%" r="30%">
      <stop offset="0%" stop-color="#f0c860" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="p6-light2" cx="50%" cy="12%" r="30%">
      <stop offset="0%" stop-color="#f0c860" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="p6-light3" cx="75%" cy="12%" r="30%">
      <stop offset="0%" stop-color="#f0c860" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Mortar texture filter -->
    <filter id="p6-mortar" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.04 0.03" numOctaves="5" seed="30" result="turb"/>
      <feColorMatrix type="matrix" values="0.08 0 0 0 0.08  0.05 0 0 0 0.08  0.02 0 0 0 0.1  0 0 0 5 -2.5" in="turb" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="screen"/>
    </filter>
    <!-- Noise -->
    <filter id="p6-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <!-- Vignette -->
    <radialGradient id="p6-vignette" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.7"/>
    </radialGradient>
    <!-- Badge -->
    <linearGradient id="p6-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Bottom bar -->
    <linearGradient id="p6-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <!-- Floor clip -->
    <clipPath id="p6-floorClip">
      <polygon points="105,160 495,160 595,330 5,330"/>
    </clipPath>
    <!-- Machine base -->
    <linearGradient id="p6-machine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a38"/>
      <stop offset="100%" stop-color="#1e1e2a"/>
    </linearGradient>
    <!-- Yellow safety stripe -->
    <pattern id="p6-stripe" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="6" height="12" fill="#f0c030" opacity="0.3"/>
      <rect x="6" width="6" height="12" fill="#1a1a20" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Base background -->
  <rect width="600" height="400" fill="url(#p6-bg)"/>

  <!-- Ceiling with exposed beams/trusses -->
  <polygon points="0,8 600,8 495,48 105,48" fill="url(#p6-ceil)"/>
  <!-- Steel trusses -->
  <g opacity="0.5">
    <!-- Truss 1 -->
    <line x1="30" y1="8" x2="140" y2="48" stroke="#1a1a28" stroke-width="2.5"/>
    <line x1="80" y1="8" x2="160" y2="48" stroke="#1a1a28" stroke-width="1"/>
    <line x1="55" y1="8" x2="145" y2="48" stroke="#16162a" stroke-width="0.5"/>
    <!-- Truss 2 -->
    <line x1="230" y1="8" x2="250" y2="48" stroke="#1a1a28" stroke-width="2.5"/>
    <line x1="270" y1="8" x2="270" y2="48" stroke="#1a1a28" stroke-width="1"/>
    <!-- Truss 3 -->
    <line x1="370" y1="8" x2="350" y2="48" stroke="#1a1a28" stroke-width="2.5"/>
    <line x1="330" y1="8" x2="340" y2="48" stroke="#1a1a28" stroke-width="1"/>
    <!-- Truss 4 -->
    <line x1="520" y1="8" x2="460" y2="48" stroke="#1a1a28" stroke-width="2.5"/>
    <line x1="570" y1="8" x2="480" y2="48" stroke="#1a1a28" stroke-width="1"/>
    <!-- Cross beam -->
    <line x1="105" y1="48" x2="495" y2="48" stroke="#1a1a28" stroke-width="2"/>
    <line x1="105" y1="35" x2="495" y2="35" stroke="#161624" stroke-width="1"/>
  </g>

  <!-- Industrial hanging lights (sodium vapor) -->
  <g opacity="0.6">
    <line x1="180" y1="48" x2="180" y2="62" stroke="#2a2a35" stroke-width="1"/>
    <polygon points="172,62 188,62 192,68 168,68" fill="#2a2a30"/>
    <rect x="174" y="66" width="12" height="2" fill="#f0c860" opacity="0.4"/>
    <line x1="300" y1="48" x2="300" y2="62" stroke="#2a2a35" stroke-width="1"/>
    <polygon points="292,62 308,62 312,68 288,68" fill="#2a2a30"/>
    <rect x="294" y="66" width="12" height="2" fill="#f0c860" opacity="0.5"/>
    <line x1="420" y1="48" x2="420" y2="62" stroke="#2a2a35" stroke-width="1"/>
    <polygon points="412,62 428,62 432,68 408,68" fill="#2a2a30"/>
    <rect x="414" y="66" width="12" height="2" fill="#f0c860" opacity="0.35"/>
  </g>

  <!-- Back wall -->
  <polygon points="105,48 495,48 495,160 105,160" fill="url(#p6-wall)"/>

  <!-- Industrial roll-up doors on back wall -->
  <rect x="130" y="65" width="90" height="90" rx="2" fill="#0d0d18" stroke="#222230" stroke-width="0.8"/>
  <!-- Door segments -->
  <line x1="135" y1="80" x2="215" y2="80" stroke="#1a1a28" stroke-width="0.5"/>
  <line x1="135" y1="95" x2="215" y2="95" stroke="#1a1a28" stroke-width="0.5"/>
  <line x1="135" y1="110" x2="215" y2="110" stroke="#1a1a28" stroke-width="0.5"/>
  <line x1="135" y1="125" x2="215" y2="125" stroke="#1a1a28" stroke-width="0.5"/>
  <line x1="135" y1="140" x2="215" y2="140" stroke="#1a1a28" stroke-width="0.5"/>

  <rect x="255" y="65" width="90" height="90" rx="2" fill="#0d0d18" stroke="#222230" stroke-width="0.8"/>
  <line x1="260" y1="80" x2="340" y2="80" stroke="#1a1a28" stroke-width="0.5"/>
  <line x1="260" y1="95" x2="340" y2="95" stroke="#1a1a28" stroke-width="0.5"/>
  <line x1="260" y1="110" x2="340" y2="110" stroke="#1a1a28" stroke-width="0.5"/>
  <line x1="260" y1="125" x2="340" y2="125" stroke="#1a1a28" stroke-width="0.5"/>
  <line x1="260" y1="140" x2="340" y2="140" stroke="#1a1a28" stroke-width="0.5"/>

  <!-- Electrical panel on right back wall -->
  <rect x="400" y="75" width="50" height="70" rx="2" fill="#1a1a28" stroke="#252535" stroke-width="0.5"/>
  <rect x="405" y="80" width="40" height="25" rx="1" fill="#12121e"/>
  <rect x="405" y="110" width="40" height="25" rx="1" fill="#12121e"/>
  <!-- Warning sign -->
  <rect x="410" y="82" width="10" height="10" rx="1" fill="#f0c030" opacity="0.15"/>

  <!-- Left wall -->
  <polygon points="0,8 105,48 105,160 5,330 0,340" fill="#0b0b14"/>
  <!-- Right wall -->
  <polygon points="600,8 495,48 495,160 595,330 600,340" fill="#0b0b14"/>

  <!-- Safety stripe on left wall base -->
  <g opacity="0.15">
    <polygon points="105,155 105,165 5,325 5,315" fill="url(#p6-stripe)"/>
  </g>
  <!-- Safety stripe on right wall base -->
  <g opacity="0.12">
    <polygon points="495,155 495,165 595,325 595,315" fill="url(#p6-stripe)"/>
  </g>

  <!-- Heavy machinery silhouettes -->
  <!-- Machine 1 - left side -->
  <g opacity="0.2">
    <rect x="140" y="120" width="60" height="40" rx="3" fill="url(#p6-machine)"/>
    <rect x="145" y="110" width="50" height="12" rx="2" fill="#222234"/>
    <rect x="155" y="105" width="30" height="7" rx="1" fill="#1e1e2e"/>
  </g>
  <!-- Machine 2 - right side -->
  <g opacity="0.18">
    <rect x="370" y="125" width="80" height="35" rx="3" fill="url(#p6-machine)"/>
    <rect x="380" y="115" width="60" height="12" rx="2" fill="#222234"/>
    <circle cx="390" cy="140" r="8" fill="#1a1a28" stroke="#252535" stroke-width="0.5"/>
    <circle cx="440" cy="140" r="8" fill="#1a1a28" stroke="#252535" stroke-width="0.5"/>
  </g>

  <!-- Floor -->
  <polygon points="105,160 495,160 595,330 5,330" fill="url(#p6-floor)"/>

  <!-- Mortar texture -->
  <g clip-path="url(#p6-floorClip)" opacity="0.5">
    <polygon points="105,160 495,160 595,330 5,330" fill="#1a1a24" filter="url(#p6-mortar)"/>
  </g>

  <!-- Floor control joints (mortar floor expansion joints) -->
  <g clip-path="url(#p6-floorClip)" opacity="0.2">
    <!-- Horizontal joints -->
    <line x1="30" y1="200" x2="570" y2="200" stroke="#2a2a38" stroke-width="0.8"/>
    <line x1="20" y1="240" x2="580" y2="240" stroke="#2a2a38" stroke-width="0.8"/>
    <line x1="10" y1="280" x2="590" y2="280" stroke="#2a2a38" stroke-width="0.8"/>
    <line x1="5" y1="320" x2="595" y2="320" stroke="#2a2a38" stroke-width="0.8"/>
    <!-- Vertical joints (converging to vanishing point at ~300,100) -->
    <line x1="300" y1="160" x2="60" y2="330" stroke="#2a2a38" stroke-width="0.5"/>
    <line x1="300" y1="160" x2="180" y2="330" stroke="#2a2a38" stroke-width="0.5"/>
    <line x1="300" y1="160" x2="300" y2="330" stroke="#2a2a38" stroke-width="0.5"/>
    <line x1="300" y1="160" x2="420" y2="330" stroke="#2a2a38" stroke-width="0.5"/>
    <line x1="300" y1="160" x2="540" y2="330" stroke="#2a2a38" stroke-width="0.5"/>
  </g>

  <!-- Heavy duty floor surface texture dots -->
  <g clip-path="url(#p6-floorClip)" opacity="0.25">
    <circle cx="150" cy="190" r="1" fill="#3a3a48" opacity="0.5"/>
    <circle cx="250" cy="195" r="1.2" fill="#3a3a48" opacity="0.4"/>
    <circle cx="350" cy="188" r="0.8" fill="#3a3a48" opacity="0.5"/>
    <circle cx="450" cy="193" r="1.1" fill="#3a3a48" opacity="0.4"/>
    <circle cx="120" cy="220" r="1.4" fill="#3a3a48" opacity="0.4"/>
    <circle cx="220" cy="225" r="1.6" fill="#3a3a48" opacity="0.3"/>
    <circle cx="320" cy="218" r="1.2" fill="#3a3a48" opacity="0.4"/>
    <circle cx="420" cy="223" r="1.5" fill="#3a3a48" opacity="0.3"/>
    <circle cx="520" cy="220" r="1" fill="#3a3a48" opacity="0.4"/>
    <circle cx="80" cy="260" r="1.8" fill="#3a3a48" opacity="0.3"/>
    <circle cx="190" cy="265" r="2" fill="#3a3a48" opacity="0.3"/>
    <circle cx="300" cy="258" r="1.5" fill="#3a3a48" opacity="0.3"/>
    <circle cx="410" cy="263" r="1.9" fill="#3a3a48" opacity="0.3"/>
    <circle cx="520" cy="260" r="1.3" fill="#3a3a48" opacity="0.3"/>
    <circle cx="50" cy="300" r="2.2" fill="#3a3a48" opacity="0.25"/>
    <circle cx="170" cy="305" r="2.5" fill="#3a3a48" opacity="0.25"/>
    <circle cx="290" cy="298" r="2" fill="#3a3a48" opacity="0.25"/>
    <circle cx="410" cy="303" r="2.3" fill="#3a3a48" opacity="0.25"/>
    <circle cx="530" cy="300" r="1.8" fill="#3a3a48" opacity="0.25"/>
  </g>

  <!-- Floor sheen -->
  <polygon points="105,160 495,160 595,330 5,330" fill="url(#p6-sheen)" opacity="0.5"/>

  <!-- Forklift tire marks (subtle) -->
  <g clip-path="url(#p6-floorClip)" opacity="0.06">
    <path d="M200,330 Q210,280 230,240 Q250,200 280,180" fill="none" stroke="#1a1a20" stroke-width="8"/>
    <path d="M220,330 Q230,280 250,240 Q270,200 300,180" fill="none" stroke="#1a1a20" stroke-width="8"/>
  </g>

  <!-- Safety line on floor -->
  <g clip-path="url(#p6-floorClip)" opacity="0.12">
    <line x1="300" y1="165" x2="300" y2="330" stroke="#f0c030" stroke-width="2.5" stroke-dasharray="8 4"/>
  </g>

  <!-- Industrial lights glow -->
  <rect width="600" height="400" fill="url(#p6-light1)"/>
  <rect width="600" height="400" fill="url(#p6-light2)"/>
  <rect width="600" height="400" fill="url(#p6-light3)"/>

  <!-- Wall-floor edge -->
  <line x1="105" y1="160" x2="495" y2="160" stroke="#222234" stroke-width="0.8" opacity="0.5"/>

  <!-- Vignette -->
  <rect width="600" height="400" fill="url(#p6-vignette)"/>

  <!-- Noise -->
  <rect width="600" height="400" fill="#09090b" opacity="0.03" filter="url(#p6-noise)"/>

  <!-- COMPLÉTÉ badge -->
  <g transform="translate(24, 16)">
    <rect width="110" height="28" rx="6" fill="url(#p6-badge)" opacity="0.9"/>
    <rect width="110" height="28" rx="6" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="16" cy="14" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <polyline points="13.5,14 15.5,16 19,11.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <text x="58" y="18.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.5">COMPLÉTÉ</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="340" width="600" height="60" fill="url(#p6-bar)"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#6366f1" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="24" y="352" width="3" height="28" rx="1.5" fill="#6366f1" opacity="0.8"/>
  <text x="38" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fafafa" letter-spacing="0.5">Usine — Anjou</text>
  <text x="38" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#6366f1" opacity="0.8" letter-spacing="2">SCI-100</text>
  <text x="576" y="376" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#a1a1aa" opacity="0.4" letter-spacing="1.5">NOVUS SURFACES</text>
</svg>