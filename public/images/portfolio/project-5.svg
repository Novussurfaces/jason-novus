<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="p5-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="p5-floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a3540"/>
      <stop offset="30%" stop-color="#354050"/>
      <stop offset="60%" stop-color="#2a3848"/>
      <stop offset="100%" stop-color="#3a4a58"/>
    </linearGradient>
    <linearGradient id="p5-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#181820"/>
      <stop offset="100%" stop-color="#101018"/>
    </linearGradient>
    <radialGradient id="p5-spot" cx="50%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#f5f0e0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <pattern id="p5-flake" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect x="2" y="3" width="5" height="3" rx="1" fill="#4a7a5a" opacity="0.3" transform="rotate(25,4,4)"/>
      <rect x="12" y="12" width="6" height="3" rx="1" fill="#8aab9a" opacity="0.22" transform="rotate(-15,15,13)"/>
      <rect x="7" y="7" width="3" height="2" rx="0.5" fill="#3a6a4a" opacity="0.25" transform="rotate(50,8,8)"/>
      <rect x="15" y="3" width="4" height="2.5" rx="1" fill="#6a9a7a" opacity="0.2" transform="rotate(-30,17,4)"/>
      <rect x="3" y="15" width="4" height="2" rx="1" fill="#9abb9a" opacity="0.18" transform="rotate(15,5,16)"/>
      <rect x="10" y="1" width="3" height="2" rx="0.5" fill="#5a8a6a" opacity="0.15" transform="rotate(40,11,2)"/>
    </pattern>
    <linearGradient id="p5-gloss" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="white" stop-opacity="0"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="p5-vignette" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="p5-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="p5-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <clipPath id="p5-floorClip">
      <polygon points="120,175 480,175 570,330 30,330"/>
    </clipPath>
  </defs>

  <rect width="600" height="400" fill="url(#p5-bg)"/>

  <!-- Ceiling with pot lights -->
  <polygon points="0,18 600,18 480,55 120,55" fill="#0b0b14"/>
  <g opacity="0.5">
    <circle cx="200" cy="42" r="6" fill="#1a1a28" stroke="#252535" stroke-width="0.5"/>
    <circle cx="200" cy="42" r="2.5" fill="#f5e6c8" opacity="0.4"/>
    <circle cx="300" cy="40" r="6" fill="#1a1a28" stroke="#252535" stroke-width="0.5"/>
    <circle cx="300" cy="40" r="2.5" fill="#f5e6c8" opacity="0.5"/>
    <circle cx="400" cy="42" r="6" fill="#1a1a28" stroke="#252535" stroke-width="0.5"/>
    <circle cx="400" cy="42" r="2.5" fill="#f5e6c8" opacity="0.4"/>
  </g>

  <!-- Back wall -->
  <polygon points="120,55 480,55 480,175 120,175" fill="url(#p5-wall)"/>
  <!-- Basement window -->
  <rect x="190" y="70" width="80" height="45" rx="2" fill="#0a0a14" stroke="#1f2540" stroke-width="0.8"/>
  <rect x="193" y="73" width="74" height="39" fill="#0c1020" opacity="0.7"/>
  <line x1="230" y1="70" x2="230" y2="115" stroke="#1f2540" stroke-width="0.4"/>
  <rect x="193" y="73" width="74" height="39" fill="#1a2a4a" opacity="0.15"/>
  <!-- Another window -->
  <rect x="330" y="70" width="80" height="45" rx="2" fill="#0a0a14" stroke="#1f2540" stroke-width="0.8"/>
  <rect x="333" y="73" width="74" height="39" fill="#0c1020" opacity="0.7"/>
  <line x1="370" y1="70" x2="370" y2="115" stroke="#1f2540" stroke-width="0.4"/>
  <rect x="333" y="73" width="74" height="39" fill="#1a2a4a" opacity="0.12"/>
  <!-- Baseboard -->
  <rect x="120" y="168" width="360" height="7" fill="#151520"/>

  <!-- Left wall -->
  <polygon points="0,18 120,55 120,175 30,330 0,340" fill="#0c0c16"/>
  <!-- Right wall -->
  <polygon points="600,18 480,55 480,175 570,330 600,340" fill="#0c0c16"/>

  <!-- Floor -->
  <polygon points="120,175 480,175 570,330 30,330" fill="url(#p5-floor)"/>
  <g clip-path="url(#p5-floorClip)">
    <polygon points="120,175 480,175 570,330 30,330" fill="url(#p5-flake)"/>
    <polygon points="120,175 480,175 570,330 30,330" fill="url(#p5-gloss)"/>
    <!-- Floor highlight streaks -->
    <line x1="100" y1="240" x2="500" y2="255" stroke="white" stroke-width="0.7" opacity="0.05"/>
    <line x1="60" y1="290" x2="540" y2="300" stroke="white" stroke-width="0.5" opacity="0.04"/>
    <!-- Subtle floor reflection of pot lights -->
    <ellipse cx="200" cy="260" rx="30" ry="10" fill="#f5f0e0" opacity="0.02"/>
    <ellipse cx="300" cy="250" rx="35" ry="12" fill="#f5f0e0" opacity="0.025"/>
    <ellipse cx="400" cy="260" rx="30" ry="10" fill="#f5f0e0" opacity="0.02"/>
  </g>

  <!-- Spot light -->
  <rect width="600" height="400" fill="url(#p5-spot)"/>

  <!-- Wall-floor edge -->
  <line x1="120" y1="175" x2="480" y2="175" stroke="#059669" stroke-width="0.5" opacity="0.2"/>

  <!-- Vignette -->
  <rect width="600" height="400" fill="url(#p5-vignette)"/>

  <!-- COMPLÉTÉ badge -->
  <g transform="translate(24, 16)">
    <rect width="110" height="28" rx="6" fill="url(#p5-badge)" opacity="0.9"/>
    <rect width="110" height="28" rx="6" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="16" cy="14" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <polyline points="13.5,14 15.5,16 19,11.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <text x="58" y="18.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.5">COMPLÉTÉ</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="340" width="600" height="60" fill="url(#p5-bar)"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#059669" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="24" y="352" width="3" height="28" rx="1.5" fill="#059669" opacity="0.8"/>
  <text x="38" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fafafa" letter-spacing="0.5">Sous-sol Résidentiel — Brossard</text>
  <text x="38" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#059669" opacity="0.8" letter-spacing="2">SCI-FLAKE</text>
  <text x="576" y="376" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#a1a1aa" opacity="0.4" letter-spacing="1.5">NOVUS SURFACES</text>
</svg>