<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="p4-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="p4-floor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a4a5a"/>
      <stop offset="25%" stop-color="#4a5a6a"/>
      <stop offset="50%" stop-color="#3a4a55"/>
      <stop offset="75%" stop-color="#5a6a7a"/>
      <stop offset="100%" stop-color="#4a5a68"/>
    </linearGradient>
    <linearGradient id="p4-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a24"/>
      <stop offset="100%" stop-color="#12121a"/>
    </linearGradient>
    <radialGradient id="p4-spot1" cx="30%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#f5f0e0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="p4-spot2" cx="70%" cy="25%" r="35%">
      <stop offset="0%" stop-color="#f5f0e0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="p4-quartz" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.08 0.04" numOctaves="6" seed="12" result="turb"/>
      <feColorMatrix type="matrix" values="0.15 0.1 0 0 0.2  0.1 0.15 0.05 0 0.3  0 0.05 0.1 0 0.35  0 0 0 4 -1.5" in="turb" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="screen"/>
    </filter>
    <pattern id="p4-fleck" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="5" r="1.5" fill="#8a9aaa" opacity="0.3"/>
      <circle cx="11" cy="3" r="1" fill="#6a7a8a" opacity="0.25"/>
      <circle cx="7" cy="11" r="1.8" fill="#9aabbb" opacity="0.2"/>
      <circle cx="14" cy="13" r="1.2" fill="#7a8a9a" opacity="0.28"/>
      <circle cx="2" cy="14" r="0.8" fill="#aabbcc" opacity="0.15"/>
    </pattern>
    <radialGradient id="p4-vignette" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.6"/>
    </radialGradient>
    <linearGradient id="p4-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="p4-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <clipPath id="p4-floorClip">
      <polygon points="100,180 500,180 580,330 20,330"/>
    </clipPath>
  </defs>

  <rect width="600" height="400" fill="url(#p4-bg)"/>

  <!-- Ceiling -->
  <polygon points="0,20 600,20 500,60 100,60" fill="#0b0b14"/>
  <!-- Ceiling hood vents (kitchen) -->
  <g opacity="0.5">
    <rect x="160" y="35" width="80" height="18" rx="2" fill="#1a1a28" stroke="#252535" stroke-width="0.5"/>
    <rect x="360" y="35" width="80" height="18" rx="2" fill="#1a1a28" stroke="#252535" stroke-width="0.5"/>
    <rect x="170" y="45" width="60" height="3" rx="1" fill="#f5e6c8" opacity="0.2"/>
    <rect x="370" y="45" width="60" height="3" rx="1" fill="#f5e6c8" opacity="0.2"/>
  </g>

  <!-- Back wall -->
  <polygon points="100,60 500,60 500,180 100,180" fill="url(#p4-wall)"/>
  <!-- Stainless steel backsplash -->
  <rect x="115" y="80" width="370" height="80" fill="#1e2030" stroke="#2a2a40" stroke-width="0.5"/>
  <line x1="115" y1="100" x2="485" y2="100" stroke="#2a2a40" stroke-width="0.3" opacity="0.6"/>
  <line x1="115" y1="120" x2="485" y2="120" stroke="#2a2a40" stroke-width="0.3" opacity="0.6"/>
  <line x1="115" y1="140" x2="485" y2="140" stroke="#2a2a40" stroke-width="0.3" opacity="0.6"/>
  <!-- Counter shelf -->
  <rect x="110" y="160" width="380" height="6" rx="1" fill="#252535"/>
  <line x1="110" y1="166" x2="490" y2="166" stroke="#0891b2" stroke-width="0.3" opacity="0.3"/>

  <!-- Left wall -->
  <polygon points="0,20 100,60 100,180 20,330 0,340" fill="#0e0e18"/>
  <!-- Right wall -->
  <polygon points="600,20 500,60 500,180 580,330 600,340" fill="#0e0e18"/>

  <!-- Floor -->
  <polygon points="100,180 500,180 580,330 20,330" fill="url(#p4-floor)"/>
  <g clip-path="url(#p4-floorClip)">
    <polygon points="100,180 500,180 580,330 20,330" filter="url(#p4-quartz)" opacity="0.5"/>
    <polygon points="100,180 500,180 580,330 20,330" fill="url(#p4-fleck)"/>
    <!-- Quartz aggregate highlights -->
    <circle cx="180" cy="240" r="2" fill="#aabbcc" opacity="0.15"/>
    <circle cx="320" cy="220" r="2.5" fill="#8899aa" opacity="0.12"/>
    <circle cx="450" cy="260" r="1.8" fill="#bbccdd" opacity="0.1"/>
    <circle cx="250" cy="280" r="3" fill="#99aabb" opacity="0.08"/>
    <circle cx="400" cy="300" r="2" fill="#aabbcc" opacity="0.12"/>
    <circle cx="150" cy="300" r="2.5" fill="#7788aa" opacity="0.1"/>
    <!-- Floor sheen -->
    <ellipse cx="300" cy="260" rx="200" ry="50" fill="white" opacity="0.025"/>
    <line x1="100" y1="230" x2="500" y2="245" stroke="white" stroke-width="0.6" opacity="0.04"/>
  </g>

  <!-- Spot lights -->
  <rect width="600" height="400" fill="url(#p4-spot1)"/>
  <rect width="600" height="400" fill="url(#p4-spot2)"/>

  <!-- Wall-floor edge -->
  <line x1="100" y1="180" x2="500" y2="180" stroke="#0891b2" stroke-width="0.5" opacity="0.2"/>

  <!-- Vignette -->
  <rect width="600" height="400" fill="url(#p4-vignette)"/>

  <!-- COMPLÉTÉ badge -->
  <g transform="translate(24, 16)">
    <rect width="110" height="28" rx="6" fill="url(#p4-badge)" opacity="0.9"/>
    <rect width="110" height="28" rx="6" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="16" cy="14" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <polyline points="13.5,14 15.5,16 19,11.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <text x="58" y="18.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.5">COMPLÉTÉ</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="340" width="600" height="60" fill="url(#p4-bar)"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#0891b2" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="24" y="352" width="3" height="28" rx="1.5" fill="#0891b2" opacity="0.8"/>
  <text x="38" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fafafa" letter-spacing="0.5">Cuisine Commerciale — Longueuil</text>
  <text x="38" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#0891b2" opacity="0.8" letter-spacing="2">SCI-QUARTZ</text>
  <text x="576" y="376" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#a1a1aa" opacity="0.4" letter-spacing="1.5">NOVUS SURFACES</text>
</svg>