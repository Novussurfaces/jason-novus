<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <!-- Background -->
    <linearGradient id="p3-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d18"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <!-- Metallic floor base -->
    <linearGradient id="p3-floor" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#1a2540"/>
      <stop offset="30%" stop-color="#1e3050"/>
      <stop offset="60%" stop-color="#182844"/>
      <stop offset="100%" stop-color="#121e35"/>
    </linearGradient>
    <!-- Metallic swirl gradient 1 -->
    <radialGradient id="p3-swirl1" cx="35%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#4a8ac7" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#2563eb" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Metallic swirl gradient 2 -->
    <radialGradient id="p3-swirl2" cx="65%" cy="55%" r="35%">
      <stop offset="0%" stop-color="#c0c0d0" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8090a0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Metallic swirl gradient 3 -->
    <radialGradient id="p3-swirl3" cx="50%" cy="40%" r="30%">
      <stop offset="0%" stop-color="#6090c0" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Floor reflection -->
    <linearGradient id="p3-reflect" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.06"/>
      <stop offset="30%" stop-color="#c0d0e0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <!-- Wall gradient -->
    <linearGradient id="p3-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#15152a"/>
      <stop offset="100%" stop-color="#101020"/>
    </linearGradient>
    <!-- Showroom spot lights -->
    <radialGradient id="p3-spot1" cx="25%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#f5f0e0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="p3-spot2" cx="50%" cy="25%" r="25%">
      <stop offset="0%" stop-color="#f5f0e0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="p3-spot3" cx="75%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#f5f0e0" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Metallic turbulence filter -->
    <filter id="p3-metallic" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.015 0.025" numOctaves="5" seed="8" result="turb"/>
      <feColorMatrix type="matrix" values="0.1 0 0 0 0.15  0 0.1 0 0 0.25  0 0 0.2 0 0.45  0 0 0 6 -2" in="turb" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="screen"/>
    </filter>
    <!-- Noise filter -->
    <filter id="p3-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feBlend in="SourceGraphic" mode="multiply"/>
    </filter>
    <!-- Vignette -->
    <radialGradient id="p3-vignette" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.65"/>
    </radialGradient>
    <!-- Badge -->
    <linearGradient id="p3-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Bottom bar -->
    <linearGradient id="p3-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <!-- Floor clip -->
    <clipPath id="p3-floorClip">
      <polygon points="130,170 470,170 570,330 30,330"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="600" height="400" fill="url(#p3-bg)"/>

  <!-- Ceiling -->
  <polygon points="0,15 600,15 470,55 130,55" fill="#0b0b14"/>
  <!-- Ceiling track lights -->
  <g opacity="0.6">
    <rect x="180" y="40" width="40" height="4" rx="2" fill="#1a1a28"/>
    <circle cx="190" cy="47" r="2" fill="#f5e6c8" opacity="0.4"/>
    <circle cx="210" cy="47" r="2" fill="#f5e6c8" opacity="0.4"/>
    <rect x="280" y="38" width="40" height="4" rx="2" fill="#1a1a28"/>
    <circle cx="290" cy="45" r="2" fill="#f5e6c8" opacity="0.5"/>
    <circle cx="310" cy="45" r="2" fill="#f5e6c8" opacity="0.5"/>
    <rect x="380" y="40" width="40" height="4" rx="2" fill="#1a1a28"/>
    <circle cx="390" cy="47" r="2" fill="#f5e6c8" opacity="0.4"/>
    <circle cx="410" cy="47" r="2" fill="#f5e6c8" opacity="0.4"/>
  </g>

  <!-- Back wall -->
  <polygon points="130,55 470,55 470,170 130,170" fill="url(#p3-wall)"/>

  <!-- Glass windows on back wall (showroom) -->
  <rect x="150" y="70" width="90" height="85" rx="2" fill="#0c0c1a" stroke="#1f2540" stroke-width="0.8"/>
  <rect x="153" y="73" width="84" height="79" fill="#0e1020" opacity="0.8"/>
  <line x1="195" y1="70" x2="195" y2="155" stroke="#1f2540" stroke-width="0.5"/>
  <!-- Car silhouette behind glass -->
  <g opacity="0.12">
    <ellipse cx="195" cy="135" rx="30" ry="10" fill="#4a6a9a"/>
    <path d="M170,128 Q175,115 195,112 Q215,115 220,128" fill="#3a5a8a"/>
  </g>

  <rect x="255" y="70" width="90" height="85" rx="2" fill="#0c0c1a" stroke="#1f2540" stroke-width="0.8"/>
  <rect x="258" y="73" width="84" height="79" fill="#0e1020" opacity="0.8"/>
  <line x1="300" y1="70" x2="300" y2="155" stroke="#1f2540" stroke-width="0.5"/>
  <!-- Car silhouette -->
  <g opacity="0.15">
    <ellipse cx="300" cy="135" rx="32" ry="11" fill="#5a7aaa"/>
    <path d="M274,128 Q280,113 300,110 Q320,113 326,128" fill="#4a6a9a"/>
  </g>

  <rect x="360" y="70" width="90" height="85" rx="2" fill="#0c0c1a" stroke="#1f2540" stroke-width="0.8"/>
  <rect x="363" y="73" width="84" height="79" fill="#0e1020" opacity="0.8"/>
  <line x1="405" y1="70" x2="405" y2="155" stroke="#1f2540" stroke-width="0.5"/>

  <!-- Left wall -->
  <polygon points="0,15 130,55 130,170 30,330 0,340" fill="#0c0c16"/>
  <!-- Right wall -->
  <polygon points="600,15 470,55 470,170 570,330 600,340" fill="#0c0c16"/>

  <!-- Floor -->
  <polygon points="130,170 470,170 570,330 30,330" fill="url(#p3-floor)"/>

  <!-- Metallic swirl effect on floor -->
  <g clip-path="url(#p3-floorClip)">
    <!-- Base metallic texture -->
    <polygon points="130,170 470,170 570,330 30,330" fill="#1a2540" filter="url(#p3-metallic)" opacity="0.6"/>

    <!-- Blue/silver swirl paths -->
    <path d="M80,200 Q200,190 250,230 Q300,270 400,250 Q500,230 560,280" fill="none" stroke="#4a8ac7" stroke-width="25" stroke-opacity="0.08" stroke-linecap="round"/>
    <path d="M50,250 Q150,230 220,270 Q290,310 380,280 Q470,250 580,300" fill="none" stroke="#c0c8d8" stroke-width="30" stroke-opacity="0.06" stroke-linecap="round"/>
    <path d="M100,220 Q180,250 280,210 Q380,170 450,220 Q520,270 560,250" fill="none" stroke="#2563eb" stroke-width="20" stroke-opacity="0.07" stroke-linecap="round"/>
    <path d="M30,280 Q130,260 200,300 Q300,340 420,300 Q500,270 570,310" fill="none" stroke="#8090b0" stroke-width="35" stroke-opacity="0.05" stroke-linecap="round"/>
    <path d="M60,230 Q160,215 240,250 Q340,285 430,240 Q510,200 590,260" fill="none" stroke="#5a80b0" stroke-width="15" stroke-opacity="0.09" stroke-linecap="round"/>

    <!-- Radial swirl overlays -->
    <rect x="30" y="170" width="540" height="160" fill="url(#p3-swirl1)"/>
    <rect x="30" y="170" width="540" height="160" fill="url(#p3-swirl2)"/>
    <rect x="30" y="170" width="540" height="160" fill="url(#p3-swirl3)"/>
  </g>

  <!-- Floor reflection/sheen -->
  <polygon points="130,170 470,170 570,330 30,330" fill="url(#p3-reflect)" opacity="0.5"/>

  <!-- Reflective highlights on floor (simulating showroom lights reflected) -->
  <g clip-path="url(#p3-floorClip)" opacity="0.15">
    <ellipse cx="200" cy="250" rx="40" ry="15" fill="#d0d8e8" opacity="0.12"/>
    <ellipse cx="300" cy="240" rx="35" ry="12" fill="#e0e8f0" opacity="0.15"/>
    <ellipse cx="400" cy="255" rx="40" ry="15" fill="#d0d8e8" opacity="0.10"/>
  </g>

  <!-- Spot light cones -->
  <rect width="600" height="400" fill="url(#p3-spot1)"/>
  <rect width="600" height="400" fill="url(#p3-spot2)"/>
  <rect width="600" height="400" fill="url(#p3-spot3)"/>

  <!-- Wall-floor edge -->
  <line x1="130" y1="170" x2="470" y2="170" stroke="#2a3a5a" stroke-width="0.8" opacity="0.5"/>

  <!-- Vignette -->
  <rect width="600" height="400" fill="url(#p3-vignette)"/>

  <!-- Noise overlay -->
  <rect width="600" height="400" fill="#09090b" opacity="0.025" filter="url(#p3-noise)"/>

  <!-- COMPLÉTÉ badge -->
  <g transform="translate(24, 16)">
    <rect width="110" height="28" rx="6" fill="url(#p3-badge)" opacity="0.9"/>
    <rect width="110" height="28" rx="6" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="16" cy="14" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <polyline points="13.5,14 15.5,16 19,11.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <text x="58" y="18.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.5">COMPLÉTÉ</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="340" width="600" height="60" fill="url(#p3-bar)"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#d97706" stroke-width="0.5" stroke-opacity="0.3"/>
  <rect x="24" y="352" width="3" height="28" rx="1.5" fill="#d97706" opacity="0.8"/>
  <text x="38" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fafafa" letter-spacing="0.5">Showroom Automobile — Québec</text>
  <text x="38" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#d97706" opacity="0.8" letter-spacing="2">SCI-METALLIC</text>
  <text x="576" y="376" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#a1a1aa" opacity="0.4" letter-spacing="1.5">NOVUS SURFACES</text>
</svg>