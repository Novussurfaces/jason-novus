<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="p1-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <!-- Floor gradient - blue/gray flake epoxy -->
    <linearGradient id="p1-floor" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#2a3a4a"/>
      <stop offset="40%" stop-color="#1e2d3d"/>
      <stop offset="100%" stop-color="#151f2b"/>
    </linearGradient>
    <!-- Floor reflection/shine -->
    <linearGradient id="p1-shine" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#4a7ab5" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#3a6090" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <!-- Wall gradient -->
    <linearGradient id="p1-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#111520"/>
    </linearGradient>
    <!-- Left wall gradient -->
    <linearGradient id="p1-lwall" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <!-- Right wall gradient -->
    <linearGradient id="p1-rwall" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#0e0e18"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
    <!-- Ceiling light glow -->
    <radialGradient id="p1-light" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#4a8ac7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Noise filter for texture -->
    <filter id="p1-noise" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
      <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blended"/>
      <feComponentTransfer in="blended">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <!-- Flake pattern filter -->
    <filter id="p1-flakes" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="0.08 0.06" numOctaves="4" seed="2" result="turb"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.2  0 0 0 0 0.35  0 0 0 0 0.55  0 0 0 8 -3.5" in="turb" result="colored"/>
      <feBlend in="SourceGraphic" in2="colored" mode="screen"/>
    </filter>
    <!-- Subtle vignette -->
    <radialGradient id="p1-vignette" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0.6"/>
    </radialGradient>
    <!-- Badge gradient -->
    <linearGradient id="p1-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <!-- Bottom bar gradient -->
    <linearGradient id="p1-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#0a0f1a"/>
    </linearGradient>
    <!-- Clip for perspective floor area -->
    <clipPath id="p1-floorClip">
      <polygon points="120,175 480,175 580,330 20,330"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="600" height="400" fill="url(#p1-bg)"/>

  <!-- Back wall -->
  <polygon points="120,60 480,60 480,175 120,175" fill="url(#p1-wall)"/>
  <!-- Back wall subtle line details -->
  <line x1="200" y1="60" x2="200" y2="175" stroke="#1f2535" stroke-width="0.5"/>
  <line x1="300" y1="60" x2="300" y2="175" stroke="#1f2535" stroke-width="0.5"/>
  <line x1="400" y1="60" x2="400" y2="175" stroke="#1f2535" stroke-width="0.5"/>

  <!-- Garage door track line at top -->
  <line x1="130" y1="65" x2="470" y2="65" stroke="#2a3040" stroke-width="1.5"/>
  <line x1="130" y1="68" x2="470" y2="68" stroke="#1a2030" stroke-width="0.5"/>

  <!-- Left wall in perspective -->
  <polygon points="0,20 120,60 120,175 20,330 0,340" fill="url(#p1-lwall)"/>
  <!-- Right wall in perspective -->
  <polygon points="600,20 480,60 480,175 580,330 600,340" fill="url(#p1-rwall)"/>

  <!-- Ceiling -->
  <polygon points="0,20 600,20 480,60 120,60" fill="#0c0c15"/>
  <!-- Ceiling light fixture -->
  <rect x="260" y="42" width="80" height="6" rx="1" fill="#1a2030"/>
  <rect x="270" y="44" width="60" height="2" rx="1" fill="#3a5a7a" opacity="0.4"/>

  <!-- Floor in perspective -->
  <polygon points="120,175 480,175 580,330 20,330" fill="url(#p1-floor)"/>

  <!-- Flake texture on floor -->
  <g clip-path="url(#p1-floorClip)" filter="url(#p1-flakes)" opacity="0.5">
    <polygon points="120,175 480,175 580,330 20,330" fill="#1a2a3a"/>
  </g>

  <!-- Individual flake dots - blue and gray scattered -->
  <g clip-path="url(#p1-floorClip)" opacity="0.7">
    <!-- Row 1 - far -->
    <circle cx="200" cy="185" r="1.2" fill="#4a7ab5" opacity="0.6"/>
    <circle cx="230" cy="182" r="0.8" fill="#8a9aaa" opacity="0.5"/>
    <circle cx="260" cy="186" r="1" fill="#3a6a9a" opacity="0.5"/>
    <circle cx="290" cy="183" r="1.3" fill="#6a7a8a" opacity="0.4"/>
    <circle cx="320" cy="185" r="0.9" fill="#4a8ac7" opacity="0.5"/>
    <circle cx="350" cy="181" r="1.1" fill="#7a8a9a" opacity="0.5"/>
    <circle cx="380" cy="184" r="0.7" fill="#3a6a9a" opacity="0.6"/>
    <circle cx="410" cy="186" r="1" fill="#5a7a9a" opacity="0.4"/>
    <!-- Row 2 -->
    <circle cx="170" cy="200" r="1.5" fill="#4a7ab5" opacity="0.6"/>
    <circle cx="210" cy="197" r="1" fill="#9aaaba" opacity="0.5"/>
    <circle cx="245" cy="202" r="1.8" fill="#3a6090" opacity="0.5"/>
    <circle cx="280" cy="198" r="1.2" fill="#6a8aaa" opacity="0.6"/>
    <circle cx="310" cy="203" r="1.4" fill="#4a8ac7" opacity="0.4"/>
    <circle cx="345" cy="196" r="1" fill="#8a9aaa" opacity="0.5"/>
    <circle cx="375" cy="201" r="1.6" fill="#3a6a9a" opacity="0.5"/>
    <circle cx="410" cy="199" r="1.1" fill="#5a7a9a" opacity="0.6"/>
    <circle cx="440" cy="203" r="0.9" fill="#4a6a8a" opacity="0.4"/>
    <!-- Row 3 -->
    <circle cx="140" cy="218" r="1.8" fill="#4a7ab5" opacity="0.6"/>
    <circle cx="185" cy="215" r="1.3" fill="#7a8a9a" opacity="0.5"/>
    <circle cx="225" cy="220" r="2" fill="#3a6a9a" opacity="0.5"/>
    <circle cx="265" cy="216" r="1.5" fill="#8aaaca" opacity="0.6"/>
    <circle cx="305" cy="221" r="1.7" fill="#4a8ac7" opacity="0.5"/>
    <circle cx="340" cy="214" r="1.2" fill="#6a7a8a" opacity="0.4"/>
    <circle cx="380" cy="219" r="1.9" fill="#3a6090" opacity="0.6"/>
    <circle cx="420" cy="217" r="1.4" fill="#5a8aaa" opacity="0.5"/>
    <circle cx="455" cy="222" r="1.1" fill="#4a6a8a" opacity="0.5"/>
    <!-- Row 4 -->
    <circle cx="100" cy="240" r="2" fill="#4a7ab5" opacity="0.5"/>
    <circle cx="150" cy="237" r="1.6" fill="#8a9aaa" opacity="0.6"/>
    <circle cx="200" cy="243" r="2.2" fill="#3a6a9a" opacity="0.5"/>
    <circle cx="250" cy="238" r="1.8" fill="#6a8aaa" opacity="0.5"/>
    <circle cx="300" cy="244" r="2" fill="#4a8ac7" opacity="0.6"/>
    <circle cx="345" cy="236" r="1.5" fill="#9aaaba" opacity="0.4"/>
    <circle cx="390" cy="241" r="2.1" fill="#3a6090" opacity="0.5"/>
    <circle cx="435" cy="239" r="1.7" fill="#5a7a9a" opacity="0.6"/>
    <circle cx="480" cy="243" r="1.3" fill="#4a6a8a" opacity="0.5"/>
    <circle cx="520" cy="240" r="1.8" fill="#3a5a7a" opacity="0.4"/>
    <!-- Row 5 - near -->
    <circle cx="60" cy="268" r="2.5" fill="#4a7ab5" opacity="0.5"/>
    <circle cx="120" cy="265" r="2" fill="#7a8a9a" opacity="0.6"/>
    <circle cx="180" cy="272" r="2.8" fill="#3a6a9a" opacity="0.5"/>
    <circle cx="240" cy="266" r="2.2" fill="#8aaaca" opacity="0.5"/>
    <circle cx="300" cy="273" r="2.5" fill="#4a8ac7" opacity="0.6"/>
    <circle cx="360" cy="264" r="1.8" fill="#6a7a8a" opacity="0.5"/>
    <circle cx="420" cy="270" r="2.6" fill="#3a6090" opacity="0.5"/>
    <circle cx="475" cy="267" r="2.1" fill="#5a8aaa" opacity="0.6"/>
    <circle cx="530" cy="271" r="1.6" fill="#4a6a8a" opacity="0.4"/>
    <!-- Row 6 - closest -->
    <circle cx="35" cy="300" r="3" fill="#4a7ab5" opacity="0.4"/>
    <circle cx="100" cy="296" r="2.5" fill="#8a9aaa" opacity="0.5"/>
    <circle cx="170" cy="303" r="3.2" fill="#3a6a9a" opacity="0.5"/>
    <circle cx="240" cy="298" r="2.7" fill="#6a8aaa" opacity="0.5"/>
    <circle cx="310" cy="305" r="3" fill="#4a8ac7" opacity="0.5"/>
    <circle cx="380" cy="295" r="2.3" fill="#9aaaba" opacity="0.4"/>
    <circle cx="445" cy="301" r="3.1" fill="#3a6090" opacity="0.5"/>
    <circle cx="510" cy="299" r="2.6" fill="#5a7a9a" opacity="0.5"/>
    <circle cx="565" cy="304" r="2" fill="#4a6a8a" opacity="0.4"/>
  </g>

  <!-- Floor shine/reflection -->
  <polygon points="120,175 480,175 580,330 20,330" fill="url(#p1-shine)" opacity="0.4"/>

  <!-- Car silhouette hint in garage (subtle) -->
  <g opacity="0.08">
    <ellipse cx="300" cy="210" rx="80" ry="15" fill="#4a7ab5"/>
  </g>

  <!-- Light glow from ceiling -->
  <rect width="600" height="340" fill="url(#p1-light)"/>

  <!-- Wall-floor edge highlight -->
  <line x1="120" y1="175" x2="480" y2="175" stroke="#2a4060" stroke-width="0.8" opacity="0.5"/>

  <!-- Perspective edge lines -->
  <line x1="120" y1="175" x2="20" y2="330" stroke="#1a2a3a" stroke-width="0.5" opacity="0.4"/>
  <line x1="480" y1="175" x2="580" y2="330" stroke="#1a2a3a" stroke-width="0.5" opacity="0.4"/>

  <!-- Vignette overlay -->
  <rect width="600" height="400" fill="url(#p1-vignette)"/>

  <!-- Subtle noise overlay -->
  <rect width="600" height="400" fill="#09090b" opacity="0.03" filter="url(#p1-noise)"/>

  <!-- COMPLÉTÉ badge -->
  <g transform="translate(24, 16)">
    <rect width="110" height="28" rx="6" fill="url(#p1-badge)" opacity="0.9"/>
    <rect width="110" height="28" rx="6" fill="none" stroke="#4ade80" stroke-width="0.5" stroke-opacity="0.3"/>
    <circle cx="16" cy="14" r="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.9"/>
    <polyline points="13.5,14 15.5,16 19,11.5" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
    <text x="58" y="18.5" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="white" letter-spacing="1.5">COMPLÉTÉ</text>
  </g>

  <!-- Bottom label bar -->
  <rect x="0" y="340" width="600" height="60" fill="url(#p1-bar)"/>
  <line x1="0" y1="340" x2="600" y2="340" stroke="#2563eb" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- Accent line -->
  <rect x="24" y="352" width="3" height="28" rx="1.5" fill="#2563eb" opacity="0.8"/>
  <!-- Project label -->
  <text x="38" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#fafafa" letter-spacing="0.5">Garage Résidentiel — Laval</text>
  <!-- System name -->
  <text x="38" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="500" fill="#2563eb" opacity="0.8" letter-spacing="2">SCI-FLAKE</text>
  <!-- Novus branding -->
  <text x="576" y="376" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#a1a1aa" opacity="0.4" letter-spacing="1.5">NOVUS SURFACES</text>
</svg>