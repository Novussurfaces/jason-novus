<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="epoxy-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="epoxy-sheen" cx="40%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="flake-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#1d4ed8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#epoxy-bg)"/>
  <rect width="800" height="600" fill="url(#epoxy-sheen)"/>
  <!-- Glossy floor effect -->
  <rect width="800" height="600" fill="url(#flake-grad)"/>
  <!-- Flake chips scattered -->
  <rect x="80" y="90" width="8" height="5" rx="1" fill="#93c5fd" opacity="0.2" transform="rotate(25 84 92)"/>
  <rect x="200" y="150" width="7" height="4" rx="1" fill="#60a5fa" opacity="0.18" transform="rotate(-15 203 152)"/>
  <rect x="400" y="100" width="9" height="5" rx="1" fill="#bfdbfe" opacity="0.15" transform="rotate(45 404 102)"/>
  <rect x="550" y="200" width="8" height="5" rx="1" fill="#93c5fd" opacity="0.2" transform="rotate(60 554 202)"/>
  <rect x="150" y="300" width="7" height="4" rx="1" fill="#60a5fa" opacity="0.17" transform="rotate(-30 153 302)"/>
  <rect x="350" y="350" width="9" height="5" rx="1" fill="#dbeafe" opacity="0.13" transform="rotate(10 354 352)"/>
  <rect x="600" y="380" width="8" height="5" rx="1" fill="#93c5fd" opacity="0.18" transform="rotate(70 604 382)"/>
  <rect x="250" y="450" width="7" height="4" rx="1" fill="#60a5fa" opacity="0.15" transform="rotate(-45 253 452)"/>
  <rect x="500" y="480" width="9" height="5" rx="1" fill="#bfdbfe" opacity="0.16" transform="rotate(35 504 482)"/>
  <rect x="700" y="120" width="8" height="5" rx="1" fill="#93c5fd" opacity="0.2" transform="rotate(55 704 122)"/>
  <rect x="100" y="500" width="7" height="4" rx="1" fill="#60a5fa" opacity="0.14" transform="rotate(-60 103 502)"/>
  <rect x="450" y="250" width="9" height="5" rx="1" fill="#dbeafe" opacity="0.15" transform="rotate(20 454 252)"/>
  <!-- Glossy reflection lines -->
  <line x1="0" y1="200" x2="800" y2="180" stroke="white" stroke-opacity="0.03" stroke-width="1"/>
  <line x1="0" y1="400" x2="800" y2="380" stroke="white" stroke-opacity="0.02" stroke-width="1"/>
  <!-- Light reflection spot -->
  <ellipse cx="350" cy="280" rx="200" ry="150" fill="white" opacity="0.02"/>
  <!-- Label -->
  <rect x="24" y="24" width="100" height="32" rx="8" fill="#22c55e" opacity="0.9"/>
  <text x="74" y="44" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="white">APRÈS</text>
</svg>
