<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <!-- Clean garage wall -->
    <linearGradient id="clean-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8e6e2"/>
      <stop offset="50%" stop-color="#dddbd7"/>
      <stop offset="100%" stop-color="#d5d3cf"/>
    </linearGradient>
    <!-- Epoxy flake floor base - warm gray-beige -->
    <linearGradient id="epoxy-base" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#9a9590"/>
      <stop offset="30%" stop-color="#8a8580"/>
      <stop offset="60%" stop-color="#928d88"/>
      <stop offset="100%" stop-color="#7d7873"/>
    </linearGradient>
    <!-- Glossy surface sheen -->
    <linearGradient id="gloss-sheen" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.04"/>
      <stop offset="60%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.02"/>
    </linearGradient>
    <!-- Light reflection band -->
    <linearGradient id="light-reflect" x1="0.3" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="50%" stop-color="white" stop-opacity="0.15"/>
      <stop offset="70%" stop-color="white" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Warm gold accent reflection -->
    <radialGradient id="gold-reflect" cx="0.35" cy="0.35" r="0.5">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0.06"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </radialGradient>
    <!-- Flake pattern - multi-color chips -->
    <pattern id="flakes-1" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse" patternTransform="rotate(5)">
      <!-- Tan/beige flakes -->
      <rect x="3" y="5" width="7" height="4" rx="1.5" fill="#b8a892" opacity="0.45" transform="rotate(25,6,7)"/>
      <rect x="22" y="2" width="6" height="3" rx="1" fill="#c4b8a5" opacity="0.35" transform="rotate(-15,25,4)"/>
      <rect x="33" y="18" width="5" height="3" rx="1" fill="#bfb3a0" opacity="0.4" transform="rotate(40,35,19)"/>
      <!-- Dark brown flakes -->
      <rect x="12" y="15" width="6" height="3.5" rx="1.2" fill="#6b5d4f" opacity="0.35" transform="rotate(-30,15,17)"/>
      <rect x="28" y="30" width="7" height="3" rx="1.2" fill="#7a6c5e" opacity="0.3" transform="rotate(15,31,31)"/>
      <!-- White/cream flakes -->
      <rect x="8" y="28" width="5" height="3" rx="1" fill="#e5ddd0" opacity="0.3" transform="rotate(50,10,29)"/>
      <rect x="18" y="8" width="4" height="2.5" rx="0.8" fill="#ece5d8" opacity="0.25" transform="rotate(-40,20,9)"/>
      <!-- Warm gold accent flakes -->
      <rect x="35" y="8" width="4" height="2.5" rx="1" fill="#C9A84C" opacity="0.15" transform="rotate(20,37,9)"/>
      <rect x="5" y="35" width="5" height="2.5" rx="1" fill="#d4b45e" opacity="0.12" transform="rotate(-25,7,36)"/>
      <!-- Charcoal flakes -->
      <rect x="15" y="35" width="5" height="3" rx="1" fill="#4a443e" opacity="0.25" transform="rotate(35,17,36)"/>
      <rect x="25" y="20" width="4" height="2.5" rx="0.8" fill="#524c46" opacity="0.22" transform="rotate(-10,27,21)"/>
    </pattern>
    <pattern id="flakes-2" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse" patternTransform="rotate(-8)">
      <rect x="2" y="4" width="5" height="3" rx="1" fill="#a89880" opacity="0.3" transform="rotate(15,4,5)"/>
      <rect x="16" y="12" width="6" height="3" rx="1.2" fill="#8a7c6e" opacity="0.28" transform="rotate(-35,19,13)"/>
      <rect x="10" y="24" width="4" height="2.5" rx="0.8" fill="#d8cfc2" opacity="0.22" transform="rotate(45,12,25)"/>
      <rect x="24" y="4" width="5" height="2.5" rx="1" fill="#C9A84C" opacity="0.1" transform="rotate(-20,26,5)"/>
      <rect x="22" y="24" width="5" height="3" rx="1" fill="#5a5248" opacity="0.2" transform="rotate(30,24,25)"/>
      <rect x="6" y="16" width="4" height="2" rx="0.8" fill="#c8bfb0" opacity="0.2" transform="rotate(-50,8,17)"/>
    </pattern>
    <!-- Wall light glow -->
    <radialGradient id="wall-light" cx="0.5" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <!-- Depth shadow at wall-floor junction -->
    <linearGradient id="junction-shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Clean painted wall -->
  <rect width="800" height="260" fill="url(#clean-wall)"/>
  <rect width="800" height="260" fill="url(#wall-light)"/>

  <!-- Subtle wall texture -->
  <rect width="800" height="260" opacity="0.03">
    <animate attributeName="opacity" values="0.03;0.04;0.03" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Wall baseboard -->
  <rect x="0" y="240" width="800" height="18" fill="#c5c3bf" opacity="0.6"/>
  <line x1="0" y1="240" x2="800" y2="240" stroke="#b5b3af" stroke-width="1" opacity="0.5"/>

  <!-- Wall-floor junction shadow -->
  <rect x="0" y="255" width="800" height="20" fill="url(#junction-shadow)"/>

  <!-- LED light on wall -->
  <rect x="350" y="40" width="100" height="6" rx="3" fill="#f5f0e0" opacity="0.6"/>
  <ellipse cx="400" cy="43" rx="120" ry="80" fill="white" opacity="0.04"/>

  <!-- Epoxy flake floor -->
  <polygon points="0,255 800,255 800,600 0,600" fill="url(#epoxy-base)"/>

  <!-- Flake layers -->
  <polygon points="0,255 800,255 800,600 0,600" fill="url(#flakes-1)"/>
  <polygon points="0,255 800,255 800,600 0,600" fill="url(#flakes-2)"/>

  <!-- Glossy surface sheen -->
  <polygon points="0,255 800,255 800,600 0,600" fill="url(#gloss-sheen)"/>

  <!-- Main light reflection band across floor -->
  <polygon points="0,255 800,255 800,600 0,600" fill="url(#light-reflect)"/>

  <!-- Secondary light reflections -->
  <ellipse cx="300" cy="380" rx="180" ry="60" fill="white" opacity="0.045" transform="rotate(-3,300,380)"/>
  <ellipse cx="550" cy="440" rx="150" ry="50" fill="white" opacity="0.035" transform="rotate(2,550,440)"/>

  <!-- Gold accent light reflection -->
  <ellipse cx="400" cy="400" rx="300" ry="150" fill="url(#gold-reflect)"/>

  <!-- Subtle reflection lines (overhead lights) -->
  <line x1="200" y1="280" x2="220" y2="580" stroke="white" stroke-width="1.2" opacity="0.04"/>
  <line x1="400" y1="270" x2="410" y2="590" stroke="white" stroke-width="1.5" opacity="0.05"/>
  <line x1="600" y1="280" x2="580" y2="580" stroke="white" stroke-width="1.2" opacity="0.04"/>

  <!-- Floor edge detail - clean seamless finish -->
  <line x1="0" y1="258" x2="800" y2="258" stroke="#a09a94" stroke-width="0.8" opacity="0.3"/>

  <!-- Faint horizon reflection glow -->
  <rect x="0" y="255" width="800" height="40" fill="white" opacity="0.03"/>
</svg>