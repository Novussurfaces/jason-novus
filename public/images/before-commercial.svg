    <linearGradient id="cf" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5c5c5c"/><stop offset="100%" stop-color="#484848"/></linearGradient>
    <filter id="cn"><feTurbulence type="fractalNoise" baseFrequency="0.6" numOctaves="4" seed="7"/><feColorMatrix type="saturate" values="0"/><feComponentTransfer><feFuncA type="linear" slope="0.07"/></feComponentTransfer><feBlend in="SourceGraphic" mode="overlay"/></filter>
