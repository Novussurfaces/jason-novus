<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <linearGradient id="cb-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c1c1c"/>
      <stop offset="100%" stop-color="#121212"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#cb-bg)"/>
  <filter id="concrete2">
    <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="5" seed="7"/>
    <feColorMatrix type="saturate" values="0"/>
    <feComponentTransfer>
      <feFuncR type="linear" slope="0.18" intercept="0.12"/>
      <feFuncG type="linear" slope="0.17" intercept="0.11"/>
      <feFuncB type="linear" slope="0.16" intercept="0.10"/>
    </feComponentTransfer>
  </filter>
  <rect width="800" height="600" filter="url(#concrete2)" opacity="0.7"/>
  <!-- Expansion joints -->
  <line x1="200" y1="0" x2="200" y2="600" stroke="#0a0a0a" stroke-width="3" opacity="0.5"/>
  <line x1="400" y1="0" x2="400" y2="600" stroke="#0a0a0a" stroke-width="3" opacity="0.5"/>
  <line x1="600" y1="0" x2="600" y2="600" stroke="#0a0a0a" stroke-width="3" opacity="0.5"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#0a0a0a" stroke-width="3" opacity="0.5"/>
  <line x1="0" y1="400" x2="800" y2="400" stroke="#0a0a0a" stroke-width="3" opacity="0.5"/>
  <!-- Wear marks (tire/forklift) -->
  <rect x="150" y="250" width="500" height="15" rx="2" fill="#0d0d0d" opacity="0.35"/>
  <rect x="150" y="330" width="500" height="15" rx="2" fill="#0d0d0d" opacity="0.3"/>
  <!-- Spalling -->
  <ellipse cx="300" cy="150" rx="45" ry="30" fill="#1a1a1a" opacity="0.4"/>
  <ellipse cx="550" cy="450" rx="55" ry="35" fill="#191919" opacity="0.35"/>
  <!-- Label -->
  <rect x="24" y="24" width="100" height="32" rx="8" fill="#dc2626" opacity="0.9"/>
  <text x="74" y="44" text-anchor="middle" font-family="system-ui" font-size="13" font-weight="700" fill="white">AVANT</text>
</svg>
