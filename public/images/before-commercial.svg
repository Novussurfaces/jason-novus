  <line x1="320" y1="220" x2="320" y2="600" stroke="#4a4a4a" stroke-width="1" opacity="0.35"/>
  <line x1="480" y1="220" x2="480" y2="600" stroke="#4a4a4a" stroke-width="1" opacity="0.35"/>
