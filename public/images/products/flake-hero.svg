<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="fk-bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#052e16"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="fk-glow" cx="45%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="fk-blur"><feGaussianBlur stdDeviation="35"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#fk-bg)"/>
  <rect width="800" height="600" fill="url(#fk-glow)"/>
