  <rect x="250" y="300" width="11" height="7" rx="2" fill="#34d399" opacity="0.15" transform="rotate(-30 255 303)"/>
  <rect x="550" y="280" width="13" height="8" rx="2" fill="#059669" opacity="0.22" transform="rotate(55 556 284)"/>
  <rect x="150" y="350" width="10" height="6" rx="1.5" fill="#10b981" opacity="0.18" transform="rotate(10 155 353)"/>
  <rect x="420" y="340" width="15" height="9" rx="2" fill="#059669" opacity="0.2" transform="rotate(-45 427 344)"/>
