<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="qz-bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#0a1a2a"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="qz-glow" cx="50%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="qz-blur"><feGaussianBlur stdDeviation="30"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#qz-bg)"/>
  <rect width="800" height="600" fill="url(#qz-glow)"/>
  <!-- Quartz crystal shapes -->
  <polygon points="350,180 380,280 320,280" fill="#0891b2" opacity="0.08"/>
  <polygon points="420,150 460,300 380,300" fill="#06b6d4" opacity="0.06"/>
  <polygon points="300,220 340,350 260,350" fill="#0e7490" opacity="0.07"/>
  <polygon points="480,200 510,320 450,320" fill="#0891b2" opacity="0.05"/>
  <polygon points="370,250 400,380 340,380" fill="#06b6d4" opacity="0.08"/>
  <!-- Scattered quartz particles -->
  <rect x="200" y="180" width="4" height="4" fill="#06b6d4" opacity="0.4" transform="rotate(30 202 182)"/>
  <rect x="550" y="220" width="3" height="3" fill="#0891b2" opacity="0.35" transform="rotate(45 551 221)"/>
  <rect x="300" y="400" width="5" height="5" fill="#22d3ee" opacity="0.3" transform="rotate(15 302 402)"/>
  <rect x="500" y="350" width="3" height="3" fill="#06b6d4" opacity="0.25" transform="rotate(60 501 351)"/>
  <rect x="150" y="300" width="4" height="4" fill="#0891b2" opacity="0.3" transform="rotate(20 152 302)"/>
  <rect x="620" y="280" width="3" height="3" fill="#22d3ee" opacity="0.35" transform="rotate(50 621 281)"/>
  <!-- Core -->
  <circle cx="400" cy="280" r="100" fill="#0891b2" opacity="0.06" filter="url(#qz-blur)"/>
  <!-- Text -->
  <text x="400" y="270" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="white" opacity="0.6" letter-spacing="8">QUARTZ SYSTEM</text>
  <text x="400" y="300" text-anchor="middle" font-family="system-ui" font-size="11" fill="white" opacity="0.3" letter-spacing="4">BROADCAST AGGREGATE · TEXTURED FINISH</text>
</svg>
