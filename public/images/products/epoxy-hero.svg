<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="ep-bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="ep-glow" cx="40%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#2563eb" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="ep-floor" x1="0" y1="0.5" x2="1" y2="0.8">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#2563eb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.05"/>
    </linearGradient>
    <filter id="ep-blur"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="ep-blur-sm"><feGaussianBlur stdDeviation="15"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#ep-bg)"/>
  <rect width="800" height="600" fill="url(#ep-glow)"/>
  <!-- Floor perspective -->
  <path d="M0 350 L400 280 L800 350 L800 600 L0 600Z" fill="url(#ep-floor)"/>
  <!-- Reflection lines -->
  <line x1="100" y1="380" x2="350" y2="340" stroke="#2563eb" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="200" y1="420" x2="500" y2="360" stroke="#2563eb" stroke-opacity="0.06" stroke-width="1"/>
  <line x1="50" y1="460" x2="600" y2="380" stroke="#2563eb" stroke-opacity="0.04" stroke-width="1"/>
  <!-- Glowing orbs -->
  <circle cx="350" cy="250" r="120" fill="#2563eb" opacity="0.08" filter="url(#ep-blur)"/>
  <circle cx="500" cy="200" r="80" fill="#3b82f6" opacity="0.12" filter="url(#ep-blur)"/>
  <circle cx="250" cy="300" r="60" fill="#1d4ed8" opacity="0.1" filter="url(#ep-blur-sm)"/>
  <!-- Grid pattern -->
  <pattern id="ep-grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <rect width="40" height="40" fill="none" stroke="white" stroke-opacity="0.02"/>
  </pattern>
  <rect width="800" height="600" fill="url(#ep-grid)"/>
  <!-- Text -->
  <text x="400" y="260" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="white" opacity="0.6" letter-spacing="8">EPOXY SYSTEM</text>
  <text x="400" y="290" text-anchor="middle" font-family="system-ui" font-size="11" fill="white" opacity="0.3" letter-spacing="4">100% SOLIDS · HIGH PERFORMANCE</text>
</svg>
