<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="pu-bg" cx="50%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#09090b"/>
    </radialGradient>
    <radialGradient id="pu-glow" cx="45%" cy="40%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="pu-blur"><feGaussianBlur stdDeviation="40"/></filter>
    <filter id="pu-blur-sm"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>
  <rect width="800" height="600" fill="url(#pu-bg)"/>
  <rect width="800" height="600" fill="url(#pu-glow)"/>
  <!-- Energy waves -->
  <ellipse cx="400" cy="300" rx="300" ry="200" fill="none" stroke="#7c3aed" stroke-opacity="0.08" stroke-width="1"/>
  <ellipse cx="400" cy="300" rx="240" ry="160" fill="none" stroke="#8b5cf6" stroke-opacity="0.06" stroke-width="1"/>
  <ellipse cx="400" cy="300" rx="180" ry="120" fill="none" stroke="#7c3aed" stroke-opacity="0.1" stroke-width="1"/>
  <ellipse cx="400" cy="300" rx="120" ry="80" fill="none" stroke="#a78bfa" stroke-opacity="0.08" stroke-width="1"/>
  <!-- Core glow -->
  <circle cx="400" cy="300" r="80" fill="#7c3aed" opacity="0.1" filter="url(#pu-blur)"/>
  <circle cx="400" cy="300" r="40" fill="#8b5cf6" opacity="0.15" filter="url(#pu-blur-sm)"/>
  <!-- Scatter particles -->
  <circle cx="250" cy="200" r="3" fill="#8b5cf6" opacity="0.4"/>
  <circle cx="550" cy="180" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="180" cy="380" r="2.5" fill="#7c3aed" opacity="0.35"/>
  <circle cx="620" cy="350" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="350" cy="150" r="1.5" fill="#a78bfa" opacity="0.25"/>
  <circle cx="500" cy="420" r="3" fill="#7c3aed" opacity="0.3"/>
  <!-- Text -->
  <text x="400" y="280" text-anchor="middle" font-family="system-ui" font-size="14" font-weight="600" fill="white" opacity="0.6" letter-spacing="8">POLYUREA SYSTEM</text>
  <text x="400" y="310" text-anchor="middle" font-family="system-ui" font-size="11" fill="white" opacity="0.3" letter-spacing="4">RAPID CURE · EXTREME DURABILITY</text>
</svg>
